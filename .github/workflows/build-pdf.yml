name: Build and Publish PDF

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Set up Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: latest

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f docs/requirements.txt ]; then
            pip install -r docs/requirements.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: "Compile PDF"
        run: |
          python merge_docs.py mkdocs.yml
          pandoc docs/combined.md -o docs/book.typ --from commonmark_x --to typst
          (echo '#let horizontalrule = line(length: 100%, stroke: 0.5pt + luma(150))'; echo '#let blockquote = quote.with(block: true)') | cat - docs/book.typ > temp && mv temp docs/book.typ
          mkdir -p site/pdf
          typst compile docs/main.typ site/pdf/document.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
