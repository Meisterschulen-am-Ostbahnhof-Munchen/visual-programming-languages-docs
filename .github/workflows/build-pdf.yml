name: Build and Publish PDF

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Set up Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: latest

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Merge Markdown files
        run: |
          python merge_docs.py

      - name: Convert combined Markdown to Typst
        run: |
          pandoc docs/combined.md -o docs/book.typ --from gfm --to typst
          (echo '#let horizontalrule = line(length: 100%, stroke: 0.5pt + luma(150))'; echo '#let blockquote = quote.with(block: true)') | cat - docs/book.typ > temp && mv temp docs/book.typ



      - name: Compile PDF with Typst
        run: |
          mkdir -p site/pdf
          typst compile docs/main.typ site/pdf/Low-Code-Referenz.pdf

      - name: Deploy PDF to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site/pdf
          branch: gh-pages
