name: Build and Publish PDF

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango1.0-dev libpangoft2-1.0-0 libjpeg-dev libopenjp2-7-dev libffi-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Build MkDocs and generate PDF
        env:
          BUILD_PDF: "1"
        run: |
          python -m mkdocs build

      - name: Deploy PDF to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site/pdf
          branch: gh-pages
